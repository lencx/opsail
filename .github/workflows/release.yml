name: Release binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify release
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    outputs:
      rust-version: ${{ steps.versions.outputs.rust-version }}
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Verify tag and read toolchain version
        id: versions
        shell: bash
        run: |
          set -euo pipefail

          metadata="$(cargo metadata --locked --no-deps --format-version 1)"
          package_version="$(jq -r '.packages[] | select(.name == "opsail") | .version' <<<"$metadata")"
          rust_version="$(jq -r '.packages[] | select(.name == "opsail") | .rust_version' <<<"$metadata")"

          if [[ -z "$package_version" || "$package_version" == "null" ]]; then
            echo "::error::Unable to read the opsail package version"
            exit 1
          fi

          if [[ -z "$rust_version" || "$rust_version" == "null" ]]; then
            echo "::error::Unable to read the opsail Rust version"
            exit 1
          fi

          expected_tag="v$package_version"
          if [[ "$GITHUB_REF_NAME" != "$expected_tag" ]]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package version $expected_tag"
            exit 1
          fi

          echo "rust-version=$rust_version" >>"$GITHUB_OUTPUT"

      - name: Install Rust
        env:
          RUST_VERSION: ${{ steps.versions.outputs.rust-version }}
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install "$RUST_VERSION" --profile minimal --no-self-update
          rustup default "$RUST_VERSION"
          rustup component add clippy rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Test
        run: cargo test --workspace --locked

  build:
    name: Build ${{ matrix.target }}
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            target: aarch64-apple-darwin
            asset: opsail-aarch64-apple-darwin.tar.gz
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            asset: opsail-x86_64-apple-darwin.tar.gz
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            asset: opsail-x86_64-unknown-linux-musl.tar.gz
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            asset: opsail-aarch64-unknown-linux-musl.tar.gz
          - runner: windows-2025
            target: x86_64-pc-windows-msvc
            asset: opsail-x86_64-pc-windows-msvc.zip
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust target
        env:
          RUST_VERSION: ${{ needs.verify.outputs.rust-version }}
          TARGET: ${{ matrix.target }}
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install "$RUST_VERSION" --profile minimal --no-self-update
          rustup default "$RUST_VERSION"
          rustup target add "$TARGET"

      - name: Install musl toolchain
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes musl-tools
          echo "CC=musl-gcc" >>"$GITHUB_ENV"
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=musl-gcc" >>"$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=musl-gcc" >>"$GITHUB_ENV"

      - name: Build
        run: cargo build --locked --release --package opsail --target ${{ matrix.target }}

      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          "target/${{ matrix.target }}/release/opsail" --version
          "target/${{ matrix.target }}/release/opsail" read --help >/dev/null

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & "target/${{ matrix.target }}/release/opsail.exe" --version
          & "target/${{ matrix.target }}/release/opsail.exe" read --help | Out-Null

      - name: Package Unix archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          archive_root="opsail-${{ matrix.target }}"
          mkdir -p "dist/$archive_root"
          install -m 755 "target/${{ matrix.target }}/release/opsail" "dist/$archive_root/opsail"
          cp LICENSE "dist/$archive_root/"
          tar -C dist -czf "dist/${{ matrix.asset }}" "$archive_root"

      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archiveRoot = "opsail-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "dist/$archiveRoot" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/opsail.exe" "dist/$archiveRoot/opsail.exe"
          Copy-Item LICENSE "dist/$archiveRoot/"
          Compress-Archive -Path "dist/$archiveRoot" -DestinationPath "dist/${{ matrix.asset }}" -CompressionLevel Optimal

      - name: Upload archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: dist/${{ matrix.asset }}
          archive: false
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs:
      - verify
      - build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download archives
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: opsail-*
          path: dist
          merge-multiple: true
          skip-decompress: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum opsail-* >SHA256SUMS
          sha256sum --check SHA256SUMS

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          create_args=(
            --draft
            --verify-tag
            --generate-notes
            --title "$GITHUB_REF_NAME"
          )
          publish_args=(--draft=false)

          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            create_args+=(--prerelease)
            publish_args+=(--prerelease --latest=false)
          else
            publish_args+=(--latest)
          fi

          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$GITHUB_REF_NAME" dist/* --repo "$GITHUB_REPOSITORY" "${create_args[@]}"
          fi

          gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" "${publish_args[@]}"
